projects:
  - name: AEM Cloud Migration – Wyndham Hotels & Resorts
    description: >
      Led end-to-end migration of AEM 6.5 to AEM as a Cloud Service (AEMaaCS) for Wyndham's
      global brand sites. Involved full code refactoring, repository restructuring, Dispatcher
      modernization, and Cloud Manager CI/CD pipeline setup with zero-downtime deployment.
    tech:
      - AEM as a Cloud Service
      - Cloud Manager
      - Dispatcher
      - Java
      - Maven
      - GitHub Actions
    highlights:
      - Zero-downtime deployment across all global brand sites
      - Eliminated all deprecated APIs and restructured repository to cloud-compatible layout
      - Established automated CI/CD with Cloud Manager quality gates

  - name: Edge Delivery Services & Universal Editor – Wyndham
