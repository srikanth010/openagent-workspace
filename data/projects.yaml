  - name: OpenAgent Workspace
    description: >
      Production-grade AI agent system that serves as an intelligent career assistant for
      recruiters and hiring managers. Built with FastAPI, a custom MCP (Model Context Protocol)
      server, and Ollama running qwen2.5-coder:7b locally for LLM inference. The agent
      intelligently detects which career tools to invoke based on the user's question, executes
      them via JSON-RPC 2.0 subprocess, and synthesizes a professional response. Deployed on
      Railway with Docker and exposed via Cloudflare Tunnel, integrated with a Next.js portfolio
      site at https://srikanthkanteti.com with the API live at https://ai.bullminder.com.
    tech:
      - Python
      - FastAPI
      - MCP (Model Context Protocol) — JSON-RPC 2.0
      - Ollama (qwen2.5-coder:7b)
      - asyncio / thread pool executor
      - Docker
      - Railway
      - Cloudflare Tunnel
      - Pydantic
      - YAML
      - Next.js (frontend integration)
    highlights:
      - Custom MCP server exposing 5 structured tools — get_profile, list_skills, get_experience,
        get_projects, match_to_role — with keyword-based job description scoring (0-100 fit score)
      - Keyword-based tool dispatch layer that reliably orchestrates multi-tool calls without
        relying on Ollama's native (unreliable) tool-calling — faster and more predictable
      - Async-safe Ollama integration using sync client wrapped in thread pool executor to avoid
        blocking the FastAPI event loop
      - Stateless MCP subprocess management — server spawned and gracefully shut down per request
        for full resource isolation
      - Scope guardrails baked into system prompt to prevent LLM hallucination and keep agent
        focused on career data only
      - CORS security configured for specific allowed origins (localhost + srikanthkanteti.com)
      - 120-second API timeout and 30-second tool call timeout with graceful error responses
      - Auto CI/CD via Railway — git push to main triggers Docker build and deploy in ~2-3 minutes
      - Career data managed as version-controlled YAML (career.yaml + projects.yaml) — no database
        required, easy to update
