      and discoverability including AI search engine (GEO) optimization.
    tech:
      - Edge Delivery Services (EDS)
      - Universal Editor
      - AEM as a Cloud Service
      - JavaScript
      - CDN (Fastly / Akamai)
    highlights:
      - Achieved 90+ Lighthouse performance scores across all pages
      - Significantly improved Core Web Vitals and SEO rankings
